name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current --strip header

      - name: Download ImageMagick
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://imagemagick.org/archive/binaries/ImageMagick-7.1.2-21-portable-Q16-x64.7z" -OutFile magick.7z
          7z e magick.7z magick.exe -o"src-tauri\resources" -y
          Remove-Item magick.7z

      - name: Download ExifTool
        shell: pwsh
        run: |
          curl.exe -L "https://sourceforge.net/projects/exiftool/files/exiftool-13.57_64.zip/download" -o exiftool.zip
          Expand-Archive -Path exiftool.zip -DestinationPath exiftool_tmp
          Copy-Item "exiftool_tmp\exiftool-13.57_64\exiftool(-k).exe" "src-tauri\resources\exiftool.exe"
          Copy-Item "exiftool_tmp\exiftool-13.57_64\exiftool_files" "src-tauri\resources\exiftool_files" -Recurse
          Remove-Item exiftool.zip, exiftool_tmp -Recurse -Force

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_CONFIG: '{"bundle":{"resources":["resources/**/*"]}}'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RustyMirror ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.content }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
